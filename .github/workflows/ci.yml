name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore QdrantDotNetExample.sln

      - name: Verify formatting
        run: dotnet format QdrantDotNetExample.sln --verify-no-changes

      - name: Build
        run: dotnet build QdrantDotNetExample.sln -c Release --no-restore

      - name: Run unit tests
        run: dotnet test tests/Unit/Unit.csproj -c Release --no-build

      - name: Run integration tests
        run: dotnet test tests/Integration/Integration.csproj -c Release --no-build

      - name: Dependency vulnerability audit
        run: dotnet list QdrantDotNetExample.sln package --vulnerable --include-transitive
